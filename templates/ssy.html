<!DOCTYPE html>
<html>
<head>
    <title>SSY Calculator - Profit Pulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a href="/" class="navbar-brand">💰 Profit Pulse</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h3>👧 SSY Calculator</h3>

        <form method="post">
            <input class="form-control mb-2" name="yearly" placeholder="Yearly Investment">
            <button class="btn btn-success w-100">Calculate</button>
        </form>

        {% if result %}
        <div class="alert alert-success mt-3">
            Maturity Value: ₹ {{ result }}
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
