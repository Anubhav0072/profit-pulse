<!DOCTYPE html>
<html>
<head>
    <title>Profit Pulse</title>

    <!-- Bootstrap -->

</head>
<body>

<nav class="navbar navbar-dark bg-success">

        <span class="navbar-brand mb-0 h1">💰 Profit Pulse</span>

</nav>

        <div class="col-md-3">

                <div class="card-body text-center">

                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>SSY Calculator</h5>
                    <a href="/ssy" class="btn btn-success">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>EMI Calculator</h5>
